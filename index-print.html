<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>iSATPrep — English, the math way (print)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Source+Sans+3:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=4">
<style>
  /* PRINT STYLES */
  @page { size: A4 portrait; margin: 14mm 12mm; }

  /* Hide chrome that doesn't make sense in print */
  .nav, .twk-panel, .tweaks-panel, [class*="twk-"] { display: none !important; }

  /* Force colors in print */
  html, body, * {
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
  }

  /* Don't clip anything (page-aware) */
  body { overflow: visible !important; }

  /* Section padding tighter for paged layout */
  body { --pad-y: 3.5rem; }
  section { padding: 3rem 0 !important; }

  /* Page breaks: keep major sections together where possible */
  section { break-inside: avoid-page; page-break-inside: avoid; }
  .hero, .topics-list, .price-grid, .tcard-grid, .method-flow, .walkthroughs, .instructor-grid, .final-cta, footer {
    break-inside: avoid-page; page-break-inside: avoid;
  }

  /* Force new pages before key sections so the doc reads cleanly */
  #method, #instructor, #topics, #pricing, #faq, .final-cta, footer {
    break-before: page; page-break-before: always;
  }

  /* Avoid breaking inside cards/rows */
  .method-step, .pcard, .tcard, .topic-row, .walk-card, .faq-item { break-inside: avoid; page-break-inside: avoid; }

  /* Open all FAQ answers in print */
  .faq-item .faq-a { max-height: none !important; padding: 0 4px 18px !important; overflow: visible !important; }
  .faq-item .faq-q .plus { display: none !important; }

  /* Remove hover/transform effects */
  *, *::before, *::after {
    transition: none !important;
    animation: none !important;
    transform: none !important;
  }
  .pcard.pop { transform: none !important; }

  /* Ensure hero diagram doesn't overflow */
  .hero { padding: 2rem 0 3rem !important; }
  .hero-diagram { max-width: 360px !important; }

  /* Footer/dark sections render properly */
  footer, .bg-navy { color: #E8ECF4 !important; }

  /* Make links readable */
  a { color: inherit !important; text-decoration: none !important; }

  /* Modal — never show in print */
  .modal-backdrop, .modal { display: none !important; }
</style>
</head>
<body>
<div id="root"></div>

<script type="module" src="/src/entry-index-print.jsx"></script>
</body>
</html>
