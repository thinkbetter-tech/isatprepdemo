<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>iSATPrep — English, the math way (print)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Source+Sans+3:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=4">
<style>
  /* PRINT STYLES */
  @page { size: A4 portrait; margin: 14mm 12mm; }

  /* Hide chrome that doesn't make sense in print */
  .nav, .twk-panel, .tweaks-panel, [class*="twk-"] { display: none !important; }

  /* Force colors in print */
  html, body, * {
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
  }

  /* Don't clip anything (page-aware) */
  body { overflow: visible !important; }

  /* Section padding tighter for paged layout */
  body { --pad-y: 3.5rem; }
  section { padding: 3rem 0 !important; }

  /* Page breaks: keep major sections together where possible */
  section { break-inside: avoid-page; page-break-inside: avoid; }
  .hero, .topics-list, .price-grid, .tcard-grid, .method-flow, .walkthroughs, .instructor-grid, .final-cta, footer {
    break-inside: avoid-page; page-break-inside: avoid;
  }

  /* Force new pages before key sections so the doc reads cleanly */
  #method, #instructor, #topics, #pricing, #faq, .final-cta, footer {
    break-before: page; page-break-before: always;
  }

  /* Avoid breaking inside cards/rows */
  .method-step, .pcard, .tcard, .topic-row, .walk-card, .faq-item { break-inside: avoid; page-break-inside: avoid; }

  /* Open all FAQ answers in print */
  .faq-item .faq-a { max-height: none !important; padding: 0 4px 18px !important; overflow: visible !important; }
  .faq-item .faq-q .plus { display: none !important; }

  /* Remove hover/transform effects */
  *, *::before, *::after {
    transition: none !important;
    animation: none !important;
    transform: none !important;
  }
  .pcard.pop { transform: none !important; }

  /* Ensure hero diagram doesn't overflow */
  .hero { padding: 2rem 0 3rem !important; }
  .hero-diagram { max-width: 360px !important; }

  /* Footer/dark sections render properly */
  footer, .bg-navy { color: #E8ECF4 !important; }

  /* Make links readable */
  a { color: inherit !important; text-decoration: none !important; }

  /* Modal — never show in print */
  .modal-backdrop, .modal { display: none !important; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="sections.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = {
  "navy": "#152647",
  "amber": "#F59E0B",
  "bg": "#FAFAF7",
  "headlineFont": "Fraunces",
  "bodyFont": "Source Sans 3",
  "density": "regular",
  "heroVariant": "diagram"
};

function PrintApp() {
  // Apply theme variables once (no tweaks panel in print)
  React.useEffect(() => {
    const r = document.documentElement.style;
    r.setProperty('--navy', TWEAK_DEFAULTS.navy);
    r.setProperty('--navy-2', TWEAK_DEFAULTS.navy);
    r.setProperty('--amber', TWEAK_DEFAULTS.amber);
    r.setProperty('--bg', TWEAK_DEFAULTS.bg);
    r.setProperty('--serif', `"${TWEAK_DEFAULTS.headlineFont}", Georgia, serif`);
    r.setProperty('--sans', `"${TWEAK_DEFAULTS.bodyFont}", system-ui, sans-serif`);
    document.body.classList.add('density-regular');
  }, []);

  return (
    <div data-screen-label="Marketing Home (print)">
      <Nav />
      <Hero onOpenDemo={() => {}} variant="diagram" />
      <Problem />
      <Method />
      <Demo onOpenDemo={() => {}} />
      <Walkthroughs />
      <Instructor />
      <Topics />
      <Testimonials />
      <Pricing />
      <FAQ />
      <FinalCTA />
      <Footer />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<PrintApp />);

// Auto-print once everything is ready
(async function autoPrint(){
  try { if (document.fonts && document.fonts.ready) { await document.fonts.ready; } } catch(e){}
  // Wait for images to load
  const imgs = Array.from(document.images || []);
  await Promise.all(imgs.map(img => img.complete ? null : new Promise(res => { img.onload = img.onerror = res; })));
  await new Promise(r => setTimeout(r, 500));
  window.print();
})();
</script>
</body>
</html>
